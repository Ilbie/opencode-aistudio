# opencode-aistudio 설정 파일입니다.
# .env 대신 이 파일에서 앱 설정을 관리합니다.
# 값을 바꾼 뒤에는 실행 중인 dev/start 서버를 다시 시작하세요.

server:
  # Express와 Vite가 함께 사용하는 웹 서버 포트입니다.
  port: 3000

  # 프롬프트와 첨부 파일을 받을 때 허용하는 요청 본문 크기입니다.
  bodyLimit: 100mb

  # 브라우저로 스트리밍할 최종 답변 텍스트의 최대 글자 수입니다.
  sseFinalTextLimit: 200000

  # 브라우저로 스트리밍할 reasoning/thoughts 텍스트의 최대 글자 수입니다.
  sseThoughtsTextLimit: 80000

history:
  # 로컬 실행 기록에 보관할 최대 항목 수입니다.
  maxEntries: 30

  # 기록 파일에 저장할 최종 답변 텍스트의 최대 글자 수입니다.
  storedFinalTextLimit: 200000

  # 기록 파일에 저장할 reasoning/thoughts 텍스트의 최대 글자 수입니다.
  storedThoughtsTextLimit: 80000

  # 기록 파일에 저장할 프롬프트, 시스템 지시문, 첨부 내용의 최대 글자 수입니다.
  storedAttachmentContentLimit: 120000

gateway:
  # OpenCode 게이트웨이가 메모리에 유지할 최종 답변 텍스트의 최대 글자 수입니다.
  finalTextLimit: 200000

  # OpenCode 게이트웨이가 메모리에 유지할 reasoning/thoughts 텍스트의 최대 글자 수입니다.
  thoughtsTextLimit: 80000

  # 모델 실행 전체 타임아웃입니다. 단위는 밀리초입니다.
  timeoutMs: 300000

  # 프롬프트 전송이 끝난 뒤 idle 이벤트를 기다리는 시간입니다. 단위는 밀리초입니다.
  postPromptIdleGraceMs: 300000

opencode:
  # 관리형 OpenCode 런타임 디렉터리입니다. 비워두면 ~/.repovera/opencode-runtime을 사용합니다.
  runtimeDir: ""

  # 사용할 opencode 실행 파일 경로입니다. 비워두면 node_modules/.bin/opencode를 사용합니다.
  binaryPath: ""

  # 복사해 사용할 OpenCode auth.json 경로입니다. 비워두면 기본 OS별 위치를 자동 탐색합니다.
  authJsonPath: ""

  # 관리형 OpenCode 서버 대신 실행할 사용자 지정 명령입니다. 일반 사용에서는 비워두세요.
  command: ""

  # OpenCode 서버 시작을 기다리는 최대 시간입니다. 단위는 밀리초입니다.
  startTimeoutMs: 15000

  # OpenCode 서버가 사용할 포트 검색 범위입니다.
  portStart: 4097
  portEnd: 4197

  # 내부 OpenCode 서버 Basic Auth 사용자명입니다.
  serverUsername: opencode

  # 비워두면 실행할 때마다 내부 서버 비밀번호를 무작위로 생성합니다.
  serverPassword: ""
