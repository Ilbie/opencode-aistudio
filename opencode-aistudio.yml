# opencode-aistudio configuration.
# Edit this file to change local app behavior.
# Restart the running dev/start server after changing this file.

server:
  # Port used by the Express and Vite web server.
  port: 47831

  # Maximum request body size for prompts and attachments.
  bodyLimit: 100mb

  # Maximum number of final-answer characters streamed to the browser.
  sseFinalTextLimit: 200000

  # Maximum number of reasoning/thoughts characters streamed to the browser.
  sseThoughtsTextLimit: 80000

history:
  # Maximum number of local run-history entries to keep.
  maxEntries: 30

  # Maximum number of final-answer characters stored in the history file.
  storedFinalTextLimit: 200000

  # Maximum number of reasoning/thoughts characters stored in the history file.
  storedThoughtsTextLimit: 80000

  # Maximum number of prompt, system instruction, and attachment characters stored in history.
  storedAttachmentContentLimit: 120000

gateway:
  # Maximum number of final-answer characters retained by the OpenCode gateway.
  finalTextLimit: 200000

  # Maximum number of reasoning/thoughts characters retained by the OpenCode gateway.
  thoughtsTextLimit: 80000

  # Total model-run timeout in milliseconds.
  timeoutMs: 900000

  # Time to wait for an idle event after prompt submission completes, in milliseconds.
  postPromptIdleGraceMs: 900000

opencode:
  # Managed OpenCode runtime directory. Leave empty to use ~/.repovera/opencode-runtime.
  runtimeDir: ""

  # Path to the opencode executable. Leave empty to use node_modules/.bin/opencode.
  binaryPath: ""

  # Path to the OpenCode auth.json file to copy. Leave empty to auto-detect OS defaults.
  authJsonPath: ""

  # Custom command fallback instead of the managed OpenCode server. Leave empty for normal use.
  command: ""

  # Maximum time to wait for the OpenCode server to start, in milliseconds.
  startTimeoutMs: 15000

  # Port range used by the managed OpenCode server.
  portStart: 4097
  portEnd: 4197

  # Basic Auth username for the internal OpenCode server.
  serverUsername: opencode

  # Leave empty to generate a random internal server password on each run.
  serverPassword: ""
